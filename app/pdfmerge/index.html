<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>MergeDocs | Premium PDF Merger</title>
    <script>
        // Apply saved theme before paint to avoid flash
        if (localStorage.getItem('theme') === 'light') document.documentElement.setAttribute('data-theme', 'light');
    </script>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="styles.css">
    <!-- pdf-lib for client-side merging -->
    <script src="https://cdn.jsdelivr.net/npm/pdf-lib@1.17.1/dist/pdf-lib.min.js"></script>
</head>
<body>
    <div class="container">
        <main class="app-card">
            <header>
                <div class="header-row">
                    <h1>MergeDocs</h1>
                    <button id="theme-toggle" class="theme-toggle" title="Toggle light/dark mode" aria-label="Toggle theme">
                        <span id="theme-icon">☀</span>
                    </button>
                </div>
                <p class="subtitle">Combine multiple PDF files into one, securely in your browser.</p>
            </header>

            <section class="upload-section">
                <div id="drop-zone" class="upload-area">
                    <span class="upload-icon">📄</span>
                    <span class="upload-text-main">Click or Drag & Drop PDFs here</span>
                    <span class="upload-text-sub">Supports multiple PDF files</span>
                    <input type="file" id="file-input" multiple accept="application/pdf">
                </div>
            </section>

            <section class="filename-section">
                <label class="filename-label" for="filename-input">Output filename</label>
                <div class="filename-input-wrap">
                    <input type="text" id="filename-input" class="filename-input" value="merged_document" spellcheck="false">
                    <span class="filename-ext">.pdf</span>
                </div>
            </section>

            <section id="file-list-section" style="display: none;">
                <div id="file-list" class="file-list">
                    <!-- Files will be listed here -->
                </div>

                <div id="summary-bar" class="summary-bar">
                    <div class="summary-stats">
                        <span id="summary-files" class="summary-highlight-indigo"></span>
                        <span class="summary-sep">·</span>
                        <span id="summary-pages" class="summary-highlight-accent"></span>
                        <span class="summary-sep">·</span>
                        <span id="summary-size"></span>
                    </div>
                    <span class="privacy-badge">🔒 100% Private</span>
                </div>

                <div class="actions">
                    <button id="clear-btn" class="btn btn-secondary">
                        <span>Clear All</span>
                    </button>
                    <button id="merge-btn" class="btn btn-primary" disabled>
                        <span id="merge-btn-text">Merge & Download</span>
                    </button>
                </div>

                <div id="progress-wrap" class="progress-wrap" style="display:none;">
                    <div class="progress-meta">
                        <span id="progress-label">Merging…</span>
                        <span id="progress-pct">0%</span>
                    </div>
                    <div class="progress-track">
                        <div id="progress-fill" class="progress-fill" style="width:0%"></div>
                    </div>
                </div>

                <div id="status-message" class="status-message"></div>
            </section>
        </main>
    </div>

    <script src="script.js"></script>
</body>
</html>
