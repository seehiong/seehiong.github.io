<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>MergeDocs | Premium PDF Merger</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="styles.css">
    <!-- pdf-lib for client-side merging -->
    <script src="https://cdn.jsdelivr.net/npm/pdf-lib@1.17.1/dist/pdf-lib.min.js"></script>
</head>
<body>
    <div class="container">
        <main class="app-card">
            <header>
                <h1>MergeDocs</h1>
                <p class="subtitle">Combine multiple PDF files into one, securely in your browser.</p>
            </header>

            <section class="upload-section">
                <div id="drop-zone" class="upload-area">
                    <span class="upload-icon">📄</span>
                    <span class="upload-text-main">Click or Drag & Drop PDFs here</span>
                    <span class="upload-text-sub">Supports multiple PDF files</span>
                    <input type="file" id="file-input" multiple accept="application/pdf">
                </div>
            </section>

            <section id="file-list-section" style="display: none;">
                <div id="file-list" class="file-list">
                    <!-- Files will be listed here -->
                </div>

                <div class="actions">
                    <button id="clear-btn" class="btn btn-secondary">
                        <span>Clear All</span>
                    </button>
                    <button id="merge-btn" class="btn btn-primary" disabled>
                        <div class="loader" id="merge-loader"></div>
                        <span id="merge-btn-text">Merge & Download</span>
                    </button>
                </div>
                
                <div id="status-message" class="status-message"></div>
            </section>
        </main>
    </div>

    <script src="script.js"></script>
</body>
</html>
